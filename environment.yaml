name: gzsl-graphs
channels:
  - conda-forge
  - pytorch
  - pyg
  - nvidia
  - defaults
dependencies:
  # ---- Core Python ----
  - python=3.11
  - pip

  # ---- PyTorch (CUDA 11.8 for HPC compat; change to 12.1 if needed) ----
  - pytorch=2.1.2
  - pytorch-cuda=11.8
  - torchvision=0.16.2
  - torchaudio=2.1.2

  # ---- PyTorch Geometric ----
  - pyg=2.5.0
  - pytorch-scatter
  - pytorch-sparse
  - pytorch-cluster

  # ---- Scientific computing ----
  - numpy=1.26.4
  - scipy=1.12.0
  - scikit-learn=1.4.0
  - pandas=2.2.0

  # ---- Visualization ----
  - matplotlib=3.8.2
  - seaborn=0.13.2

  # ---- Config and logging ----
  - pyyaml=6.0.1
  - tqdm=4.66.1

  # ---- Dev tools ----
  - pytest=8.0.0
  - ipython
  - jupyterlab

  # ---- Pip-only packages ----
  - pip:
    - ogb==1.3.6
    - sentence-transformers==2.3.1
    - transformers==4.37.2
    - peft>=0.7.0               # LoRA fine-tuning for ZeroG
    - huggingface_hub>=0.20.0   # dataset downloads from HF Hub