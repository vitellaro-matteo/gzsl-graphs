# ZeroG Configuration
# Li et al., KDD 2024

# ZeroG uses separate .pt dataset files (not the shared data/ directory)
# Download from: https://drive.google.com/drive/folders/1WfBIPA3dMd8qQZ6QlQRg9MIFGMwnPdFj
data_dir: ./data/zerog

model:
  name: zerog
  R: 10                # neighborhood aggregation rounds
  if_norm: true        # normalize embeddings
  text_encoder: multi-qa-distilbert-cos-v1  # SentenceBERT variant
  lora_r: 4            # LoRA rank
  lora_alpha: 16

training:
  epochs: 50
  lr: 0.0001
  weight_decay: 0.1
  batch_size: 2
  grad_accum: 4        # gradient accumulation steps
  k: 2                 # k-hop subgraph extraction

# In-domain citation transfer (Table 2 in paper)
source_datasets:
  - Cora
  - Citeseer
  - Pubmed
  - Arxiv

target_datasets:
  - Cora
  - Citeseer
  - Pubmed